<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Girl: Horror Trivia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/game.css">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">FINAL GIRL</a>
            <div class="d-flex">
                <button class="btn btn-outline-light me-2" id="resetBtn">Reset</button>
                <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#infoModal">How to Play</button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div id="setup-area" class="row justify-content-center">
            <div class="col-md-6 border border-danger p-4 rounded">
                <form id="settingsForm" novalidate>
                    <h3>Enter your Name, Survivor</h3>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="playerName" placeholder="Name" required minlength="2">
                        <div class="invalid-feedback">You must enter a name to begin.</div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Start Survival</button>
                </form>
            </div>
        </div>

        <div id="game-area" class="d-none text-center">
            <h2 id="welcomeMsg" class="mb-4"></h2>
            
            <div class="progress mb-4" style="height: 25px;">
                <div id="slasherBar" class="progress-bar bg-danger progress-bar-striped progress-bar-animated" 
                     role="progressbar" style="width: 0%">SLASHER DISTANCE</div>
            </div>

            <div id="quiz-container" class="bg-black p-5 border rounded border-secondary">
                </div>
        </div>
    </main>

    <div class="modal fade" id="infoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light border-danger">
                <div class="modal-header">
                    <h5 class="modal-title">Survival Guide</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Answer correctly to survive. Every mistake brings the Slasher closer. If the bar fills up, you're toast!
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 border-top border-danger mt-5">
        <p>Created by <a href="https://github.com/isabellaorear31-design" class="text-danger">Isabella O'Rear</a></p>
        <div class="d-flex justify-content-center gap-3">
            <a href="https://github.com/isabellaorear31-design/horror-trivia" class="text-info">Repo</a>
            <a href="https://validator.w3.org/nu/?doc=https://isabellaorear31-design.github.io/horror-trivia/" class="text-info">Nu HTML</a>
            <a href="https://wave.webaim.org/report#/https://isabellaorear31-design.github.io/horror-trivia/" class="text-info">WAVE</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="scripts/game.js"></script>
</body>
</html>
